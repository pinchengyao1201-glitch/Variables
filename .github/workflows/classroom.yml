name: autograde

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  autograde:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Jest
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install --save-dev jest@29

      - name: Write jest config
        run: |
          cat > jest.config.cjs <<'EOF'
          module.exports = {
            testEnvironment: 'node',
            testMatch: ['**/__tests__/**/*.test.cjs']
          };
          EOF

      - name: Write tests
        run: |
          mkdir -p __tests__
          cat > __tests__/variables.test.cjs <<'TESTEOF'
          const fs = require('fs');
          const path = require('path');
          const vm = require('vm');

          const source = fs.readFileSync(path.resolve('script.js'), 'utf8');

          function runFunc(funcName, promptValues) {
            let promptIndex = 0;
            const alerts = [];
            const sandbox = {
              prompt: function(msg) { return promptValues[promptIndex++]; },
              alert: function(msg) { alerts.push(String(msg)); },
              console: { log: function(){}, error: function(){}, warn: function(){} },
              parseInt: parseInt,
              parseFloat: parseFloat,
              isNaN: isNaN,
              NaN: NaN,
              undefined: undefined,
              String: String,
              Number: Number,
              Math: Math,
            };
            vm.createContext(sandbox);
            vm.runInContext(source, sandbox, { timeout: 5000 });
            if (typeof sandbox[funcName] === 'function') {
              sandbox[funcName]();
            }
            return alerts;
          }

          describe('Unit 8.1 – Variables & Math', function() {

            test('greeting output', function() {
              let alerts = runFunc('greeting', ['Alice', 'blue']);
              expect(alerts.length).toBeGreaterThanOrEqual(1);
              expect(alerts[0]).toBe('Hello, Alice! Your favorite color is blue.');
            });

            test('does not use var keyword', function() {
              let lines = source.split('\n');
              for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line.startsWith('//')) continue;
                if (line.startsWith('*')) continue;
                expect(line).not.toMatch(/\bvar\s+[a-zA-Z_$]/);
              }
            });

            test('uses const keyword', function() {
              expect(source).toMatch(/\bconst\s+[a-zA-Z_$]/);
            });

            test('uses parseInt', function() {
              expect(source).toMatch(/parseInt\s*\(/);
            });

            test('convertTemp 212 to 100', function() {
              let alerts = runFunc('convertTemp', ['212']);
              expect(alerts.length).toBeGreaterThanOrEqual(1);
              expect(alerts[0]).toBe('Temperature in Celsius: 100.00');
            });

            test('convertTemp 32 to 0', function() {
              let alerts = runFunc('convertTemp', ['32']);
              expect(alerts.length).toBeGreaterThanOrEqual(1);
              expect(alerts[0]).toBe('Temperature in Celsius: 0.00');
            });

            test('circleArea radius 5', function() {
              let alerts = runFunc('circleArea', ['5']);
              expect(alerts.length).toBeGreaterThanOrEqual(1);
              expect(alerts[0]).toBe('Area of the circle: 78.54');
            });

            test('circleArea radius 1', function() {
              let alerts = runFunc('circleArea', ['1']);
              expect(alerts.length).toBeGreaterThanOrEqual(1);
              expect(alerts[0]).toBe('Area of the circle: 3.14');
            });

            test('numberInfo with 7', function() {
              let alerts = runFunc('numberInfo', ['7']);
              expect(alerts.length).toBeGreaterThanOrEqual(1);
              expect(alerts[0]).toBe('Square: 49, Remainder: 1');
            });

            test('numberInfo with 5', function() {
              let alerts = runFunc('numberInfo', ['5']);
              expect(alerts.length).toBeGreaterThanOrEqual(1);
              expect(alerts[0]).toBe('Square: 25, Remainder: 2');
            });

          });
          TESTEOF

      # === Graded steps (sum to 100) ===
      - id: t_greeting
        name: greeting output
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: greeting output
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "greeting output$"
          timeout: 60
          max-score: 10

      - id: t_no_var
        name: does not use var keyword
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: does not use var keyword
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "does not use var keyword$"
          timeout: 60
          max-score: 5

      - id: t_const
        name: uses const keyword
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: uses const keyword
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "uses const keyword$"
          timeout: 60
          max-score: 5

      - id: t_parseint
        name: uses parseInt
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: uses parseInt
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "uses parseInt$"
          timeout: 60
          max-score: 5

      - id: t_temp212
        name: convertTemp 212 to 100
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: convertTemp 212 to 100
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "convertTemp 212 to 100$"
          timeout: 60
          max-score: 20

      - id: t_temp32
        name: convertTemp 32 to 0
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: convertTemp 32 to 0
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "convertTemp 32 to 0$"
          timeout: 60
          max-score: 10

      - id: t_circle5
        name: circleArea radius 5
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: circleArea radius 5
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "circleArea radius 5$"
          timeout: 60
          max-score: 10

      - id: t_circle1
        name: circleArea radius 1
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: circleArea radius 1
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "circleArea radius 1$"
          timeout: 60
          max-score: 10

      - id: t_numinfo7
        name: numberInfo with 7
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: numberInfo with 7
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "numberInfo with 7$"
          timeout: 60
          max-score: 15

      - id: t_numinfo5
        name: numberInfo with 5
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: numberInfo with 5
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "numberInfo with 5$"
          timeout: 60
          max-score: 10

      # Summary
      - name: Build summary
        shell: bash
        run: |
          npx jest --runInBand --json --outputFile=jest-summary.json || true
          node - <<'NODE'
          const fs = require("fs");
          let jr = {};
          try { jr = JSON.parse(fs.readFileSync("jest-summary.json","utf8")); } catch {}
          const assertions = (jr.testResults||[]).flatMap(t => t.assertionResults || []);

          const tests = [
            { name: "greeting output", pts: 10 },
            { name: "does not use var keyword", pts: 5 },
            { name: "uses const keyword", pts: 5 },
            { name: "uses parseInt", pts: 5 },
            { name: "convertTemp 212 to 100", pts: 20 },
            { name: "convertTemp 32 to 0", pts: 10 },
            { name: "circleArea radius 5", pts: 10 },
            { name: "circleArea radius 1", pts: 10 },
            { name: "numberInfo with 7", pts: 15 },
            { name: "numberInfo with 5", pts: 10 },
          ];

          let earned = 0;
          const lines = ["# Unit 8.1 Autograder Summary", ""];
          for (const t of tests) {
            const a = assertions.find(x => x.title === t.name);
            const passed = !!a && a.status === "passed";
            if (passed) earned += t.pts;
            lines.push((passed ? "✅" : "❌") + " " + t.name + " (" + t.pts + " pts)");
          }
          lines.push("", "**Score: " + earned + "/100**");
          console.log(lines.join("\n"));
          if (process.env.GITHUB_STEP_SUMMARY) fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n") + "\n");
          NODE

      - name: Prepare reporter env
        shell: bash
        run: |
          echo "T_GREETING_RESULTS=${{ steps.t_greeting.outputs.result }}"     >> "$GITHUB_ENV"
          echo "T_NO_VAR_RESULTS=${{ steps.t_no_var.outputs.result }}"         >> "$GITHUB_ENV"
          echo "T_CONST_RESULTS=${{ steps.t_const.outputs.result }}"           >> "$GITHUB_ENV"
          echo "T_PARSEINT_RESULTS=${{ steps.t_parseint.outputs.result }}"     >> "$GITHUB_ENV"
          echo "T_TEMP212_RESULTS=${{ steps.t_temp212.outputs.result }}"       >> "$GITHUB_ENV"
          echo "T_TEMP32_RESULTS=${{ steps.t_temp32.outputs.result }}"         >> "$GITHUB_ENV"
          echo "T_CIRCLE5_RESULTS=${{ steps.t_circle5.outputs.result }}"       >> "$GITHUB_ENV"
          echo "T_CIRCLE1_RESULTS=${{ steps.t_circle1.outputs.result }}"       >> "$GITHUB_ENV"
          echo "T_NUMINFO7_RESULTS=${{ steps.t_numinfo7.outputs.result }}"     >> "$GITHUB_ENV"
          echo "T_NUMINFO5_RESULTS=${{ steps.t_numinfo5.outputs.result }}"     >> "$GITHUB_ENV"

      - name: Report grades
        uses: classroom-resources/autograding-grading-reporter@v1
        with:
          runners: 't_greeting,t_no_var,t_const,t_parseint,t_temp212,t_temp32,t_circle5,t_circle1,t_numinfo7,t_numinfo5'
          token: ${{ github.token }}
